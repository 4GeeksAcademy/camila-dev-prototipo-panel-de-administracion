<!doctype html>

    <meta charset="UTF-8" />

    <title>AgentHub | Contrataciones</title>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = { darkMode: "class" };
    </script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
      @layer base {
        #modal-overlay { transition: opacity 0.15s ease-out, visibility 0.15s ease-out; }
        #modal-overlay[style*="visibility: visible"] > div { animation: modalIn 0.15s ease-out both; }
        @keyframes modalIn { from { opacity:0; scale:0.97; } to { opacity:1; scale:1; } }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="panel.js"></script>
  </head>
  <body data-page="contratos" class="antialiased">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:left-3 focus:top-3 focus:z-50 focus:rounded-md focus:bg-white focus:px-3 focus:py-2 focus:text-sm focus:font-semibold">Saltar al contenido</a>
    <div id="app"></div>
  </body>
</html>
